syntax = "proto3";

package rqtll.api.v1;

import "types.proto";

message IntrospectionFilter {
	repeated string namespaces = 1;
	string node_name_regex = 2;
}

message TopicInfoExtended {
	string name = 1;
	string message_type = 2;
	int32 publisher_count = 3;
	int32 subscriber_count = 4;
	repeated string qos_profiles = 5;
}

message ListNodesResponse {
	repeated NodeInfo nodes = 1;
	Status status = 2;
}

message ListTopicsResponse {
	repeated TopicInfoExtended topics = 1;
	Status status = 2;
}

message NodeEvent {
  enum EventType {
    ADDED = 0;
    REMOVED = 1;
    UPDATED = 2;
  }
  EventType type = 1;
  NodeInfo node = 2;
}

message TopicEvent {
	enum EventType {
		ADDED = 0;
		REMOVED = 1;
		UPDATED = 2;
	}
	EventType type = 1;
	TopicInfo topic = 2;
}

message GraphEvent {
	oneof event {
		NodeEvent node_changed = 1;
		TopicEvent topic_changed = 2;
	}
}

service IntrospectionService {
	rpc ListNodes(Empty) returns (ListNodesResponse);

	rpc ListTopics(Empty) returns (ListTopicsResponse);

	rpc WatchGraph(IntrospectionFilter) returns (stream GraphEvent);
}
