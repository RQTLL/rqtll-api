syntax = "proto3";

package rqtll.api.v1;

import "types.proto";
import "google/protobuf/timestamp.proto";

message CommandRequest {
	string executable = 1;
	repeated string args = 2;
	map<string, string> env = 3;
	string working_dir = 4;
	bool sudowoodo = 5;
}

enum StreamType {
  STDOUT = 0;
  STDERR = 1;
}

message CommandOutput {
  google.protobuf.Timestamp timestamp = 1;
  StreamType stream = 2;
  string data = 3;
}

message SSHConfig {
	string host = 1;
	int32 port = 2;
	string user = 3;
	oneof auth {
		string password = 4;
		string key_path = 5;
	}
	int32 timeout_s = 6;
}

message SSHSession {
	string session_id = 1;
	string host = 2;
	string user = 3;
	Status status = 4;
}

message RemoteExecRequest {
	string session_id = 1;
	string command = 2;
	repeated string args = 3;
}

service SystemUtils {
	rpc RestartDaemon(Empty) returns (Status);

	rpc RunCommand(CommandRequest) returns (stream CommandOutput);

	rpc StartSSHSession(SSHConfig) returns (SSHSession);

	rpc ExecRemote(RemoteExecRequest) returns (stream CommandOutput);

	//rpc StopSSHSession(SSHSession) returns (Status);
}
