syntax = "proto3";

package rqtll.api.v1;

service ROSInstallerService {
  rpc InstallEnvironment (EnvInstallRequest) returns (stream EnvInstallProgress);
  rpc SetupRepositories (EnvInstallRequest) returns (stream EnvInstallProgress);
  rpc ConfigureEnvironment (ConfigureEnvRequest) returns (stream EnvInstallProgress);
}

message EnvInstallRequest {
}

enum StepStatus {
  RUNNING = 0;
  SUCCESS = 1;
  FAILED = 2;
}

message EnvInstallProgress {
  string step_id = 1;       // Identificador único (ej. "SETUP_KEYS", "APT_UPDATE", "UROS_BUILD")
  string log_line = 2;      // Salida directa de la terminal (stdout / stderr)
  StepStatus status = 3;    // Estado del paso actual
  int32 progress_percentage = 4; // Progreso estimado (0-100) para la barra de carga
}

message ConfigureEnvRequest {
  bool load_ros_shell = 1;
  bool config_domain_id = 2;
  int32 domain_id = 3;
  string ros_distro = 4;
}
