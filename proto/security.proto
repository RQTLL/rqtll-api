syntax = "proto3";

package rqtll.api.v1;

import "types.proto";

enum UserRole {
  GUEST = 0;
  OPERATOR = 1;		// Run nodes
  DEVELOPER = 2; 	// Compiler/Cleaner
  ADMIN = 3;     	// root
}

message AuthRequest {
	string username = 1;
	string password = 2;
}

message AuthResponse {
	bool authenticated = 1;
	string token = 2;
	UserRole role = 3;
	string session_id = 4;
	Status status = 5;
}

message CertRequest {
	string csr = 1;
}

message CertResponse {
	bool ok = 1;
	string certificate_pem = 2;
	string ca_pem = 3;
	string message = 4;
}

service SecurityService {
	rpc Authenticate(AuthRequest) returns (AuthResponse);

	rpc RequestNodeCertificate(CertRequest) returns (CertResponse);
}
