syntax = "proto3";

package rqtll.api.v1;

import "types.proto";

message BuildRequest {
	string workspace_path = 1; 
	repeated string packages = 2;
	repeated string colcon_args = 3;
	bool symlink_install = 4;
	map<string, string> env = 5;
}

message BuildEvent {
	oneof ev {
		LogEntry log = 1;
		Status status = 2;
		string current_package = 3; 
		double progress_percent = 4; 
	}
}

message CleanRequest {
	bool clean_build = 1;
	bool clean_install = 2;
	bool clean_log = 3;
}

message LoadRequest {
	string shell = 1;
	string overlay_path = 2;
}

service BuildService {
	rpc BuildWorkspace(BuildRequest) returns (stream BuildEvent);

	rpc CleanWorkspace(CleanRequest) returns (Status);

	rpc LoadOverlay(LoadRequest) returns (Status);
}
