syntax = "proto3";

package rqtll.api.v1;

import "google/protobuf/timestamp.proto";

message Empty {}

message Status {
	enum Code {
		OK = 0;
		CANCELLED = 1;
		UNKNOWN = 2;
		INVALID_ARGUMENT = 3;
		DEADLINE_EXCEEDED = 4;
		NOT_FOUND = 5;
		ALREADY_EXISTS = 6;
		PERMISSION_DENIED = 7;
		INTERNAL = 13;
		UNAVAILABLE = 14;
	}
	bool ok = 1;
	Code code = 2;
	string message = 3;
	map<string, string> details = 4;
}

enum LogLevel {
	DEBUG = 0;
	INFO = 1;
	WARN = 2;
	ERROR = 3;
}

message LogEntry {
	google.protobuf.Timestamp timestamp = 1;
	LogLevel level = 2;
	string source = 3;
	string message = 4;
	string session_id = 5;
}

message ProcessInfo {
	int32 pid = 1;
	string name = 2;
	repeated string argv = 3;
	string cwd = 4;
	Status status = 5;
}

message NodeInfo {
	string name = 1;
	string namespace = 2;
	string executable = 3;
	int32 pid = 4;
	string node_id = 5;
}

message TopicInfo {
	string name = 1;
	string message_type = 2;
	string qos = 3;
	string topic_id = 4;
}
