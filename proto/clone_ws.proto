syntax = "proto3";

package rqtll.api.v1;

service CloneWorkspaceService {
    rpc CloneWorkspace(CloneWorkspaceRequest) returns (stream CloneWorkspaceProgress);
    rpc SetCurrentTargetDir(SetCurrentTargetDirRequest) returns (SetCurrentTargetDirResponse);
}

message CloneWorkspaceRequest {
    string repository_url = 1;
    string destination_dir = 2;
    string workspace_name = 3;
    string branch = 4;
    uint32 depth = 5;
}

message CloneWorkspaceProgress {
    string log_line = 1;
    float progress = 2;
    bool completed = 3;
    bool success = 4;
}

message SetCurrentTargetDirRequest {
    string target_dir = 1;
}

message SetCurrentTargetDirResponse {
    bool ok = 1;
    string message = 2;
}
