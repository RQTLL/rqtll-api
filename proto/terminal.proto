syntax = "proto3";

package rqtll.api.v1;

import "types.proto";
import "google/protobuf/timestamp.proto";

message StartTerminalRequest {
  int32 cols = 1;
  int32 rows = 2;
  string cwd = 3;
  map<string, string> env = 4;
}

message StartTerminalResponse {
  string session_id = 1;
  Status status = 2;
}

message AttachRequest {
  string session_id = 1;
}

message TerminalOutput {
  string session_id = 1;
  bytes data = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message TerminalInput {
  string session_id = 1;
  bytes data = 2;
}

message TerminalResize {
  string session_id = 1;
  int32 cols = 2;
  int32 rows = 3;
}

message SessionRequest {
  string session_id = 1;
}

service TerminalService {
  // Starts a new PTY-backed terminal session (server will spawn a shell)
  rpc Start(StartTerminalRequest) returns (StartTerminalResponse);

  // Attach to an existing session and receive output as a stream
  rpc Attach(AttachRequest) returns (stream TerminalOutput);

  // Send input bytes to a running session
  rpc SendInput(TerminalInput) returns (Status);

  // Resize PTY
  rpc Resize(TerminalResize) returns (Status);

  // Close session
  rpc Close(SessionRequest) returns (Status);
}
