syntax = "proto3";

package rqtll.api.v1;

import "types.proto";
import "google/protobuf/timestamp.proto";

message Rviz2Request {
  string title = 1;            // -t "string title"
  string config_path = 2;      // -d "string .rviz file dir"
  string fixed_frame = 3;      // -f "string fixed frame"
  string image_path = 4;       // -s "string image file dir"
  bool fullscreen = 5;         // --fullscreen
  bool log = 6;                // -l
}

message RqtRequest {
  string perspective = 1;      // --perspective "string perspective"
  string perspective_file = 2; // --perspective-file "string .perspective file dir"
  bool ht = 3;                 // -ht
  bool fl = 4;                 // -fl
}

message GzSimRequest {
  string sdf_file = 1;         // "string sdf file dir"
  string gui_config = 2;       // --gui-config "string .config file dir"
  bool server_only = 3;        // -s
  bool gui_only = 4;           // -g
  float update_rate = 5;       // -z "float update rate"
  int32 seed = 6;              // --seed "int seed for the random gen"
  bool wait_for_assets = 7;    // --wait-for-assets
  bool run_on_start = 8;       // -r
  string physics_engine = 9;   // --physics-engine "string plugin"
  string render_engine = 10;   // --render-engine "string plugin"
  string render_engine_gui = 11; // --render-engine-gui "string plugin"
  string render_engine_server = 12; // --render-engine-server "string plugin"
  string render_engine_api_backend = 13; // --render-engine-api-backend "string api"
  string render_engine_gui_api_backend = 14; // --render-engine-gui-api-backend "string api"
  string render_engine_server_api_backend = 15; // --render-engine-server-api-backend "string api"
  int32 network_secondaries = 16; // --network-secondaries "int number of secondaries accepted"
  string network_role = 17;    // --network-role "string primary or secondary role"
  string record = 18;          // --record "string sdf file"
  string record_path = 19;     // --record-path "string dir"
  bool record_resources = 20;  // --record-resources
  repeated string record_topics = 21; // --record-topic "list [topics]"
  float record_period = 22;    // --record-period "float period seconds"
  bool log_overwrite = 23;     // --log-overwrite
  bool log_compress = 24;      // --log-compress
  string playback = 25;        // --playback "string dir"
}

message SshRequest {
  string server = 1;           // "string server" (host o IP)
  string username = 2;         // -l "string username"
  int32 port = 3;              // -p "int port"
  string key_path = 4;         // -i "string openssh compatible file dir"
  bool verbose = 5;            // -v
  bool ipv4_only = 6;          // -4
  bool ipv6_only = 7;          // -6
  string password = 8;         // Contraseña opcional si no se usa clave SSH
}

message ExecutionRequest {
  string session_id = 1;
  oneof payload {
    Rviz2Request rviz2 = 2;
    RqtRequest rqt = 3;
    GzSimRequest gz_sim = 4;
    SshRequest ssh = 5;
  }
}

message ExecutionOutput {
  string session_id = 1;
  bytes data = 2;
  google.protobuf.Timestamp timestamp = 3;
  bool is_stderr = 4;
}

message ExecutionInput {
  string session_id = 1;
  bytes data = 2;
}

message ExecutionResize {
  string session_id = 1;
  int32 cols = 2;
  int32 rows = 3;
}

message ExecutionControl {
  string session_id = 1;
  enum Action {
    STOP = 0;
    RESTART = 1;
    FORCE_STOP = 2;
  }
  Action action = 2;
}

message ExecutionStatus {
  string session_id = 1;
  bool is_running = 2;
  int32 exit_code = 3;
  Status status = 4;
}

message ActiveSessionsResponse {
  repeated ExecutionRequest sessions = 1;
}

service CommandExecutionService {
  rpc StartSession(ExecutionRequest) returns (stream ExecutionOutput);

  rpc SendInput(ExecutionInput) returns (Status);

  rpc ResizeSession(ExecutionResize) returns (Status);

  rpc ControlSession(ExecutionControl) returns (ExecutionStatus);

  rpc GetActiveSessions(Empty) returns (ActiveSessionsResponse);
}
