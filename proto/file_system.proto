syntax = "proto3";

package rqtll.api.v1;

import "types.proto";
import "google/protobuf/timestamp.proto";

message PathRequest {
  string path = 1;
  bool recursive = 2;
}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message FileInfo {
  string path = 1;
  bool is_dir = 2;
  int64 size = 3;
  google.protobuf.Timestamp mtime = 4;
  map<string, string> metadata = 5;
  enum GitStatus {
    CLEAN = 0;
    MODIFIED = 1;
    UNTRACKED = 2;
    STAGED = 3;
  }
  GitStatus git_status = 6;
}

message ListFilesResponse {
  repeated FileInfo entries = 1;
  Status status = 2;
}

message ReadFileRequest {
  string path = 1;
  int32 max_bytes = 2; // 0 => entire file
}

message FileContent {
  bytes content = 1;
  string encoding = 2;
  bool is_binary = 3;
  Status status = 4;
}

message WriteFileRequest {
  string path = 1;
  bytes content = 2;
  string encoding = 3;
  bool create_dirs = 4;
}

message FileEvent {
  enum Type {
    CREATED = 0;
    MODIFIED = 1;
    DELETED = 2;
    RENAMED = 3;
  }
  Type type = 1;
  FileInfo info = 2;
  string old_path = 3;
}

service FileService {
  rpc Stat(ReadFileRequest) returns (FileInfo);
  rpc Read(ReadFileRequest) returns (FileContent);
  rpc Write(WriteFileRequest) returns (Status);
  rpc Delete(ReadFileRequest) returns (Status);
  rpc Rename(RenameRequest) returns (Status);
  rpc List(PathRequest) returns (ListFilesResponse);
  rpc Watch(PathRequest) returns (stream FileEvent);
}
